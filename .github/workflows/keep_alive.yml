name: Keep Repository Active

on:
  schedule:
    # Runs automatically every single day at 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping-repo:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create or update heartbeat file
      run: |
        echo "Last server pulse: $(date)" > keep_alive_heartbeat.txt

    - name: Commit and Push Activity Pulse
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add keep_alive_heartbeat.txt
        git commit -m "Automated keep-alive activity pulse [skip ci]" || exit 0
        git push
