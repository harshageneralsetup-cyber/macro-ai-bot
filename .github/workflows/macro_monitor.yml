name: AI Macro Briefing Automation

on:
  schedule:
    # UTC times converted to IST (UTC+5:30)
    # 8:47 AM IST = 3:17 AM UTC
    # 2:38 PM IST = 9:08 AM UTC
    # 10:33 PM IST = 5:03 PM UTC
    - cron: '17 3 * * 1-5'   # 8:47 AM IST (Monday-Friday)
    - cron: '8 9 * * 1-5'    # 2:38 PM IST (Monday-Friday)
    - cron: '3 17 * * 1-5'   # 10:33 PM IST (Monday-Friday)
  
  workflow_dispatch: # Allows manual trigger via GitHub UI

jobs:
  run-macro-briefing:
    name: Run Macro Briefing Pipeline
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Project Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          echo "✅ Dependencies installed successfully"

      - name: 🚀 Execute Macro Briefing Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "🟢 Starting macro briefing automation at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          python main.py
          echo "🟢 Macro briefing automation completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: ❌ Handle Failures
        if: failure()
        run: |
          echo "❌ Workflow failed - check logs for details"
          exit 1
