name: AI Macro Briefing Automation

on:
  schedule:
    # 1. Morning Briefing: 03:17 AM GMT / Server Time (8:47 AM IST)
    - cron: '17 3 * * 1-5'
    
    # 2. Afternoon Briefing: 09:08 AM GMT / Server Time (2:38 PM IST)
    - cron: '8 9 * * 1-5'
    
    # 3. Night Briefing: 05:03 PM GMT / Server Time (10:33 PM IST)
    - cron: '3 17 * * 1-5'
    
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script with Injected Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
