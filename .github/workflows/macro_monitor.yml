name: AI Macro Briefing Automation

on:
  schedule:
    # Shifted to odd minutes to completely bypass high-load global delays:
    - cron: '17 3 * * 1-5'   # ~8:47 AM IST (Monday through Friday)
    - cron: '8 9 * * 1-5'    # ~2:38 PM IST (Monday through Friday)
    - cron: '3 17 * * 1-5'   # ~10:33 PM IST (Monday through Friday)
  workflow_dispatch: # Allows manual verification via the GitHub UI anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script with Injected Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
