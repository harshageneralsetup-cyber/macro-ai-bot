name: Run Macro Summary Pipeline

# Force the GitHub Actions runner environment to use Node.js 24 internally
# This permanently removes/mitigates the deprecation warnings from your logs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    # Allows you to manually trigger this pipeline anytime from your Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Check if requirements.txt exists to use it; otherwise, fall back to installing required packages manually
        if [ -f requirements.txt ]; then 
          pip install -r requirements.txt
        else 
          pip install google-genai requests beautifulsoup4 lxml
        fi

    - name: Execute Macro Script
      env:
        # Securely pass your repository secrets as environment variables to Python
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Executes your core script perfectly matching your file structure
        python main.py
