name: AI Macro Briefing Automation

on:
  schedule:
    # Runs Monday through Friday at:
    # 03:15 AM UTC (8:45 AM IST)
    # 09:00 AM UTC (2:30 PM IST)
    # 05:00 PM UTC (10:30 PM IST)
    - cron: '15 3 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '0 17 * * 1-5'
  workflow_dispatch: # Allows you to trigger the script manually from GitHub UI anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script with Injected Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
