name: AI Macro Briefing Automation

on:
  schedule:
    # Test Slot 1: Triggers at 5:10 PM IST (11:40 UTC)
    - cron: '38 11 * * 1'
    
    # Test Slot 2: Triggers at 5:13 PM IST (11:43 UTC)
    - cron: '43 11 * * 1'
    
    # Test Slot 3: Triggers at 5:16 PM IST (11:46 UTC)
    - cron: '46 11 * * 1'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script with Injected Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
