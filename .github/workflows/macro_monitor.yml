name: AI Macro Briefing Automation

on:
  schedule:
    # Test Window 1: Triggers at 4:43 PM IST (11:13 UTC)
    - cron: '13 11 * * 1'
    
    # Test Window 2: Triggers at 4:45 PM IST (11:15 UTC)
    - cron: '15 11 * * 1'
    
    # Test Window 3: Triggers at 4:47 PM IST (11:17 UTC)
    - cron: '17 11 * * 1'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script with Injected Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
